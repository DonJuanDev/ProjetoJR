# Coloque em /etc/nginx/sites-available/gateway e faça symlink para sites-enabled.
#
# Primeira vez: só porta 80 (HTTP). Rode Certbot — ele adiciona HTTPS automaticamente:
#   sudo certbot --nginx -d visionmetricsapp.com.br -d www.visionmetricsapp.com.br
#
# Depois que estiver em HTTPS, descomente o bloco do servidor :443 abaixo (opcional:
# o próprio Certbot costuma editar este arquivo e já criar o ssl_certificate para você).

upstream gateway_next {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream gateway_api {
    server 127.0.0.1:3001;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name visionmetricsapp.com.br www.visionmetricsapp.com.br;

    client_max_body_size 12m;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location /socket.io/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_pass http://gateway_api;
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://gateway_api;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://gateway_next;
    }
}

# Opcional: depois do Certbot, ele pode ter criado um segundo server { listen 443 ssl; ... }
# ou alterado este arquivo. Se quiser redirecionar HTTP→HTTPS manualmente, use:
#
# server {
#     listen 80;
#     listen [::]:80;
#     server_name visionmetricsapp.com.br www.visionmetricsapp.com.br;
#     return 301 https://$host$request_uri;
# }
